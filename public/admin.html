<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin - Dog Weight Tracker</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="page admin-page">
      <div class="topbar">
        <div class="topbar-user">
          Signed in as <span id="adminName" class="user-name">--</span>
        </div>
        <div class="topbar-actions">
          <a class="topbar-link" href="/">Back to app</a>
          <button id="adminLogoutBtn" class="topbar-button" type="button">Log out</button>
        </div>
      </div>

      <section class="auth-card">
        <p class="eyebrow">Admin</p>
        <h1>Create an account</h1>
        <p class="subtitle">Manually add new users and set admin access.</p>
        <form id="createUserForm" class="auth-form">
          <label>
            Username
            <input type="text" id="newUsernameInput" autocomplete="off" required />
          </label>
          <label>
            Password
            <input type="password" id="newPasswordInput" autocomplete="new-password" required />
          </label>
          <label class="checkbox-row">
            <input type="checkbox" id="newIsAdmin" />
            Grant admin access
          </label>
          <button type="submit">Create user</button>
          <p id="createStatus" class="helper"></p>
        </form>
      </section>
    </main>
    <script src="admin.js"></script>
  </body>
</html>
